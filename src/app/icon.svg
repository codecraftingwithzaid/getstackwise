<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A refined logo mark of three stacked, decreasing-width rounded bars in a teal-to-dark gradient of solid tones, capped with a small amber spark, next to a clean bold wordmark "Stack Wise" in dark charcoal, with "Wise" in teal.</desc>
